<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王者荣耀热点看板</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #ffffff;
  --bg: #f5f4f0;
  --surface: #ffffff;
  --border: #e8e4de;
  --text: #1a1814;
  --muted: #9a9690;
  --accent: #e8542a;
  --accent2: #f0a500;
  --xhs: #ff2d55;
  --dy: #00c4a0;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
  --radius: 16px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', 'Noto Sans SC', sans-serif;
  min-height: 100vh;
  font-size: 14px;
}

/* ===== NAV ===== */
nav {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--text);
}

.nav-logo span {
  width: 36px; height: 36px;
  background: transparent;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  overflow: hidden;
  flex-shrink: 0;
}

.nav-logo span img {
  width: 100%; height: 100%;
  object-fit: contain;
  background: #1a0a00;
  padding: 2px;
}

.nav-tabs {
  display: flex;
  gap: 4px;
}

.nav-tab {
  padding: 6px 16px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 500;
}

.nav-tab.active, .nav-tab:hover {
  background: var(--bg);
  color: var(--text);
}

.nav-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.btn {
  padding: 7px 16px;
  border-radius: 8px;
  border: none;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #d44520; }
.btn-outline { background: white; color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover { background: var(--bg); }

/* ===== LAYOUT ===== */
.container { max-width: 1280px; margin: 0 auto; padding: 28px 32px; }

/* ===== STATS ROW ===== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  box-shadow: var(--shadow);
}

.stat-label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 10px;
}

.stat-value {
  font-family: 'DM Serif Display', serif;
  font-size: 36px;
  line-height: 1;
  color: var(--text);
}

.stat-value.accent { color: var(--accent); }
.stat-value.xhs { color: var(--xhs); }
.stat-value.dy { color: var(--dy); }

.stat-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 6px;
}

/* ===== PAGES ===== */
.page { display: none; }
.page.active { display: block; }

/* ===== FILTERS ===== */
.toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  align-items: center;
  flex-wrap: wrap;
}

.search-wrap {
  flex: 1;
  min-width: 200px;
  position: relative;
}

.search-wrap::before {
  content: '🔍';
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 9px 14px 9px 36px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--white);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.15s;
  color: var(--text);
}

.search-input:focus { border-color: var(--accent); }

.filter-group {
  display: flex;
  gap: 4px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px;
}

.filter-btn {
  padding: 5px 14px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  white-space: nowrap;
}

.filter-btn.active {
  background: var(--text);
  color: white;
}

.sort-select {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--white);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  outline: none;
  cursor: pointer;
}

/* ===== CARD GRID ===== */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

.meme-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex;
  flex-direction: column;
  animation: fadeUp 0.3s ease both;
}

.meme-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-cover {
  width: 100%;
  height: 170px;
  background: var(--bg);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

.card-cover img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.3s;
}

.meme-card:hover .card-cover img { transform: scale(1.04); }

.card-cover-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
  background: linear-gradient(135deg, #fdf3ee, #fef9f0);
}

.card-source {
  position: absolute;
  top: 10px; left: 10px;
  padding: 3px 9px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  backdrop-filter: blur(8px);
}

.source-xhs { background: rgba(255,45,85,0.9); color: white; }
.source-dy { background: rgba(0,196,160,0.9); color: white; }

.card-hot {
  position: absolute;
  top: 10px; right: 10px;
  background: rgba(232,84,42,0.9);
  color: white;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  backdrop-filter: blur(8px);
}

.card-body {
  padding: 14px 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.card-title {
  font-size: 13px;
  line-height: 1.55;
  color: var(--text);
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 10px;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 10px;
}

.card-tag {
  padding: 2px 8px;
  background: #f5f4f0;
  border-radius: 4px;
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
}

.card-likes { color: var(--accent); font-weight: 600; }
.card-time { font-size: 11px; }

/* ===== EMPTY STATE ===== */
.empty {
  text-align: center;
  padding: 80px 20px;
  grid-column: 1/-1;
}

.empty-icon { font-size: 56px; margin-bottom: 16px; }
.empty h3 { font-size: 18px; margin-bottom: 8px; font-family: 'DM Serif Display', serif; }
.empty p { color: var(--muted); line-height: 1.7; }

.install-guide {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-top: 20px;
  text-align: left;
  max-width: 440px;
  margin-left: auto;
  margin-right: auto;
  box-shadow: var(--shadow);
}

.install-guide h4 { font-size: 14px; margin-bottom: 14px; color: var(--accent); }

.step {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
}

.step-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); color: white;
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
}

code {
  background: var(--bg);
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 12px;
  color: var(--accent);
  font-family: monospace;
}

/* ===== CHARTS PAGE ===== */
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}

.chart-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  box-shadow: var(--shadow);
}

.chart-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 18px;
}

.chart-wrap { position: relative; height: 220px; }

/* ===== RANKING PAGE ===== */
.ranking-list { display: flex; flex-direction: column; gap: 10px; }

.rank-item {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}

.rank-item:hover { transform: translateX(4px); box-shadow: var(--shadow-lg); }

.rank-num {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  width: 40px;
  text-align: center;
  flex-shrink: 0;
  color: var(--border);
}

.rank-num.top1 { color: #f0a500; }
.rank-num.top2 { color: #9aa0a8; }
.rank-num.top3 { color: #c67c4e; }

.rank-cover {
  width: 56px; height: 56px;
  border-radius: 10px;
  object-fit: cover;
  background: var(--bg);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  overflow: hidden;
}

.rank-cover img { width: 100%; height: 100%; object-fit: cover; }

.rank-info { flex: 1; min-width: 0; }

.rank-title {
  font-size: 14px;
  font-weight: 500;
  line-height: 1.4;
  margin-bottom: 5px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.rank-meta { font-size: 12px; color: var(--muted); display: flex; gap: 12px; }
.rank-likes { color: var(--accent); font-weight: 600; }

.rank-bar-wrap { width: 120px; flex-shrink: 0; }
.rank-bar-bg { background: var(--bg); border-radius: 4px; height: 6px; overflow: hidden; }
.rank-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.6s ease; }
.rank-bar-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-align: right; }

/* ===== TAG CLOUD PAGE ===== */
.tagcloud-wrap {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  box-shadow: var(--shadow);
  min-height: 300px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-content: flex-start;
}

.cloud-tag {
  padding: 6px 16px;
  border-radius: 100px;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.15s;
  border: 1.5px solid transparent;
}

.cloud-tag:hover { transform: scale(1.08); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}

.modal {
  background: var(--white);
  border-radius: var(--radius);
  padding: 28px;
  width: 90%; max-width: 480px;
  box-shadow: var(--shadow-lg);
}

.modal h3 { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 8px; }
.modal p { color: var(--muted); font-size: 13px; line-height: 1.7; margin-bottom: 14px; }

.modal textarea {
  width: 100%; height: 110px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  padding: 10px 12px;
  font-family: monospace;
  font-size: 12px;
  resize: none; outline: none;
  margin-bottom: 14px;
  transition: border-color 0.15s;
}

.modal textarea:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--text); color: white;
  padding: 10px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 500;
  opacity: 0; transition: all 0.25s;
  z-index: 99999; pointer-events: none;
  white-space: nowrap;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .charts-grid { grid-template-columns: 1fr; }
  .container { padding: 16px; }
  nav { padding: 0 16px; }
}
</style>
</head>

  </div>

  <!-- Charts Page -->
  <div class="page" id="page-charts">
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">📅 收集时间分布</div>
        <div class="chart-wrap"><canvas id="chartTime"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">📊 平台占比</div>
        <div class="chart-wrap"><canvas id="chartPlatform"></canvas></div>
      </div>
      <div class="chart-card" style="grid-column: 1/-1">
        <div class="chart-title">🔥 热度分布（点赞数段）</div>
        <div class="chart-wrap"><canvas id="chartLikes"></canvas></div>
      </div>
    </div>
  </div>

  <!-- Tag Cloud Page -->
  <div class="page" id="page-tagcloud">
    <div class="tagcloud-wrap" id="tagcloudWrap"></div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <h3>导入数据</h3>
    <p>在抖音/小红书页面点击 ⚔️ 悬浮按钮 →「📋 复制数据」，然后在下方粘贴（Command+V）：</p>
    <textarea id="pasteArea" placeholder="在这里粘贴数据..."></textarea>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmImport()">✅ 确认导入</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFile(event)">

<script>
const STORAGE_KEY = 'wzry_memes_v2';
let allMemes = [];
let currentFilter = 'all';
let activeTag = null;
let charts = {};

// ===== 数据 =====
async function loadData() {
  try {
    // 优先从远程JSON加载（Vercel部署版）
    const res = await fetch('./data/memes.json?t=' + Date.now());
    if (res.ok) {
      allMemes = await res.json();
    } else {
      // 降级到localStorage
      const raw = localStorage.getItem(STORAGE_KEY);
      allMemes = raw ? JSON.parse(raw) : [];
    }
  } catch {
    const raw = localStorage.getItem(STORAGE_KEY);
    allMemes = raw ? JSON.parse(raw) : [];
  }
  updateStats();
  renderCards();
}

async function refreshData() {
  await loadData();
  const page = document.querySelector('.page.active').id.replace('page-','');
  renderPage(page);
  showToast('✅ 已刷新');
}

function updateStats() {
  document.getElementById('statTotal').textContent = allMemes.length;
  document.getElementById('statXHS').textContent = allMemes.filter(m=>m.source==='小红书').length;
  document.getElementById('statDY').textContent = allMemes.filter(m=>m.source==='抖音').length;
  const today = new Date().toDateString();
  document.getElementById('statToday').textContent = allMemes.filter(m=>new Date(m.collectedAt).toDateString()===today).length;
}

// ===== 页面切换 =====
function switchPage(name, el) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  el.classList.add('active');
  renderPage(name);
}

function renderPage(name) {
  if (name==='cards') renderCards();
  else if (name==='ranking') renderRanking();
  else if (name==='charts') renderCharts();
  else if (name==='tagcloud') renderTagCloud();
}

// ===== 卡片 =====
function setFilter(el) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  currentFilter = el.dataset.f;
  renderCards();
}

function renderCards() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  let list = [...allMemes];
  if (currentFilter==='xhs') list=list.filter(m=>m.source==='小红书');
  else if (currentFilter==='dy') list=list.filter(m=>m.source==='抖音');
  if (activeTag) list=list.filter(m=>(m.tags||[]).includes(activeTag));
  if (q) list=list.filter(m=>(m.title||'').toLowerCase().includes(q)||(m.author||'').toLowerCase().includes(q));
  if (sort==='likes') list.sort((a,b)=>(b.likes||0)-(a.likes||0));
  else if (sort==='hot') list.sort((a,b)=>(b.hotScore||0)-(a.hotScore||0));
  else list.sort((a,b)=>new Date(b.collectedAt)-new Date(a.collectedAt));

  const grid = document.getElementById('cardsGrid');
  if (!allMemes.length) { grid.innerHTML=''; grid.appendChild(emptyState()); return; }
  if (!list.length) { grid.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><h3>没有找到</h3><p>换个关键词试试</p></div>'; return; }

  grid.innerHTML = '';
  list.forEach((m,i) => {
    const card = document.createElement('div');
    card.className = 'meme-card';
    card.style.animationDelay = Math.min(i*0.03,0.3)+'s';
    const isXHS = m.source==='小红书';
    const isHot = (m.likes||0) >= 100000;
    const tagsHtml = (m.tags||[]).slice(0,3).map(t=>`<span class="card-tag">${t}</span>`).join('');
    // 小红书图片走代理避免防盗链
    const imgSrc = (m.cover && isXHS) ? `/api/img?url=${encodeURIComponent(m.cover)}` : (m.cover||'');
    const ph = isXHS?'🌸':'🎵';
    const coverHtml = imgSrc
      ? `<img src="${imgSrc}" alt="" onerror="this.parentNode.innerHTML='<div class=\\'card-cover-placeholder\\'>${ph}</div>'">`
      : `<div class="card-cover-placeholder">${ph}</div>`;
    card.innerHTML = `
      <div class="card-cover">
        ${coverHtml}
        <span class="card-source ${isXHS?'source-xhs':'source-dy'}">${isXHS?'小红书':'抖音'}</span>
        ${isHot?'<span class="card-hot">🔥 热门</span>':''}
      </div>
      <div class="card-body">
        <div class="card-title">${esc(m.title||'无标题')}</div>
        ${tagsHtml?`<div class="card-tags">${tagsHtml}</div>`:''}
        <div class="card-footer">
          <span style="color:var(--muted)">@${esc(m.author||'未知')}</span>
          <span class="card-likes">👍 ${fmtNum(m.likes||0)}</span>
        </div>
      </div>
    `;
    card.onclick = () => { if(m.url && m.url!==location.href) window.open(m.url,'_blank'); };
    grid.appendChild(card);
  });
}

// ===== 排行榜 =====
function renderRanking() {
  const list = [...allMemes].sort((a,b)=>(b.likes||0)-(a.likes||0)).slice(0,20);
  const max = list[0]?.likes || 1;
  const container = document.getElementById('rankingList');
  if (!list.length) { container.innerHTML='<div class="empty"><div class="empty-icon">🏆</div><h3>暂无数据</h3></div>'; return; }
  container.innerHTML = '';
  list.forEach((m,i) => {
    const isXHS = m.source==='小红书';
    const numClass = i===0?'top1':i===1?'top2':i===2?'top3':'';
    const pct = Math.round((m.likes||0)/max*100);
    const item = document.createElement('div');
    item.className = 'rank-item';
    const rankImgSrc = (m.cover && isXHS)
      ? `/api/img?url=${encodeURIComponent(m.cover)}`
      : (m.cover || '');
    const coverInner = rankImgSrc
      ? `<img src="${rankImgSrc}" alt="" onerror="this.innerHTML='${isXHS?'🌸':'🎵'}'">`
      : (isXHS?'🌸':'🎵');
    item.innerHTML = `
      <div class="rank-num ${numClass}">${i+1}</div>
      <div class="rank-cover">${coverInner}</div>
      <div class="rank-info">
        <div class="rank-title">${esc(m.title||'无标题')}</div>
        <div class="rank-meta">
          <span class="${isXHS?'':''}">@${esc(m.author||'未知')}</span>
          <span class="rank-likes">👍 ${fmtNum(m.likes||0)}</span>
          <span>${m.publishTime||''}</span>
        </div>
      </div>
      <div class="rank-bar-wrap">
        <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${pct}%"></div></div>
        <div class="rank-bar-label">${pct}%</div>
      </div>
    `;
    item.onclick = () => { if(m.url && m.url!==location.href) window.open(m.url,'_blank'); };
    container.appendChild(item);
  });
}

// ===== 图表 =====
function renderCharts() {
  // 销毁旧图表
  Object.values(charts).forEach(c=>c.destroy());
  charts = {};

  const baseOpts = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { font: { family: 'DM Sans' }, color: '#1a1814' } } }
  };

  // 时间分布（按天）
  const dayMap = {};
  allMemes.forEach(m => {
    const d = new Date(m.collectedAt);
    const key = `${d.getMonth()+1}/${d.getDate()}`;
    dayMap[key] = (dayMap[key]||0)+1;
  });
  const dayKeys = Object.keys(dayMap).slice(-14);
  charts.time = new Chart(document.getElementById('chartTime'), {
    type: 'line',
    data: {
      labels: dayKeys,
      datasets: [{
        label: '收集数量',
        data: dayKeys.map(k=>dayMap[k]||0),
        borderColor: '#e8542a',
        backgroundColor: 'rgba(232,84,42,0.08)',
        fill: true, tension: 0.4,
        pointBackgroundColor: '#e8542a', pointRadius: 4,
      }]
    },
    options: { ...baseOpts, plugins: { ...baseOpts.plugins, legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#f0ece6' } }, x: { grid: { display: false } } } }
  });

  // 平台占比
  const xhsCount = allMemes.filter(m=>m.source==='小红书').length;
  const dyCount = allMemes.filter(m=>m.source==='抖音').length;
  charts.platform = new Chart(document.getElementById('chartPlatform'), {
    type: 'doughnut',
    data: {
      labels: ['小红书', '抖音'],
      datasets: [{ data: [xhsCount, dyCount], backgroundColor: ['#ff2d55', '#00c4a0'], borderWidth: 0 }]
    },
    options: { ...baseOpts, cutout: '65%' }
  });

  // 热度分布
  const bands = [
    { label: '2-5万', min: 20000, max: 50000 },
    { label: '5-10万', min: 50000, max: 100000 },
    { label: '10-50万', min: 100000, max: 500000 },
    { label: '50万+', min: 500000, max: Infinity },
  ];
  charts.likes = new Chart(document.getElementById('chartLikes'), {
    type: 'bar',
    data: {
      labels: bands.map(b=>b.label),
      datasets: [{
        label: '热点数量',
        data: bands.map(b => allMemes.filter(m=>(m.likes||0)>=b.min&&(m.likes||0)<b.max).length),
        backgroundColor: ['#fde8e0','#fbc5b0','#f4906a','#e8542a'],
        borderRadius: 8, borderSkipped: false,
      }]
    },
    options: { ...baseOpts, plugins: { ...baseOpts.plugins, legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#f0ece6' } }, x: { grid: { display: false } } } }
  });
}

// ===== 词云 =====
function renderTagCloud() {
  const tagCount = {};
  allMemes.forEach(m => (m.tags||[]).forEach(t => { tagCount[t]=(tagCount[t]||0)+1; }));
  const sorted = Object.entries(tagCount).sort((a,b)=>b[1]-a[1]);
  const wrap = document.getElementById('tagcloudWrap');
  if (!sorted.length) { wrap.innerHTML='<div style="color:var(--muted);padding:40px">暂无标签数据</div>'; return; }
  const max = sorted[0][1];
  const palettes = [
    {bg:'#fde8e0',color:'#c43d15',border:'#f4b8a0'},
    {bg:'#e8f8f5',color:'#00836b',border:'#a0e0d4'},
    {bg:'#fff4e0',color:'#a06800',border:'#f5d48a'},
    {bg:'#f0eeff',color:'#5040a0',border:'#c8c0f0'},
    {bg:'#ffe8f0',color:'#a00040',border:'#f0a0c0'},
  ];
  wrap.innerHTML = '';
  sorted.forEach(([tag,count],i) => {
    const size = 13 + Math.round(count/max * 10);
    const p = palettes[i%palettes.length];
    const el = document.createElement('span');
    el.className = 'cloud-tag';
    el.textContent = `${tag} ${count}`;
    el.style.cssText = `font-size:${size}px;background:${p.bg};color:${p.color};border-color:${p.border};${activeTag===tag?'outline:2px solid '+p.color+';':''}`;
    el.onclick = () => {
      activeTag = activeTag===tag ? null : tag;
      renderTagCloud();
      switchPage('cards', document.querySelector('.nav-tab'));
      document.querySelectorAll('.nav-tab').forEach((t,i)=>{ if(i===0) t.classList.add('active'); else t.classList.remove('active'); });
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
      document.getElementById('page-cards').classList.add('active');
      renderCards();
    };
    wrap.appendChild(el);
  });
}

// ===== 导入导出 =====
function openModal() {
  document.getElementById('modal').style.display = 'flex';
  setTimeout(()=>document.getElementById('pasteArea').focus(),100);
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  document.getElementById('pasteArea').value = '';
}

function confirmImport() {
  const raw = document.getElementById('pasteArea').value.trim();
  if (!raw) { showToast('⚠️ 请先粘贴数据'); return; }
  try {
    const data = JSON.parse(raw);
    if (!Array.isArray(data)) throw new Error();
    const existIds = new Set(allMemes.map(m=>m.id));
    const newItems = data.filter(m=>!existIds.has(m.id));
    allMemes = [...newItems, ...allMemes];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allMemes));
    updateStats(); renderCards(); closeModal();
    showToast(`✅ 成功导入 ${newItems.length} 条热点！`);
  } catch { showToast('❌ 数据格式有误，请重新复制'); }
}

function exportData() {
  if (!allMemes.length) { showToast('⚠️ 暂无数据'); return; }
  const blob = new Blob([JSON.stringify(allMemes,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `wzry_memes_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('✅ 导出成功！');
}

// 全局 Cmd+V 触发导入
document.addEventListener('paste', e => {
  if (document.getElementById('modal').style.display !== 'none') return;
  const text = e.clipboardData?.getData('text');
  if (text?.trim().startsWith('[')) {
    document.getElementById('pasteArea').value = text;
    openModal();
  }
});

// ===== 工具 =====
function fmtNum(n) {
  if (n >= 10000) return (n/10000).toFixed(1)+'万';
  return n.toString();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function emptyState() {
  const div = document.createElement('div');
  div.className = 'empty';
  div.style.gridColumn = '1/-1';
  div.innerHTML = `
    <div class="empty-icon">⚔️</div>
    <h3>还没有收集到热点</h3>
    <p>安装油猴脚本后，去抖音/小红书搜索「王者荣耀」并滚动浏览，<br>满足热度门槛的内容会自动收集。</p>
    <div class="install-guide">
      <h4>📦 快速上手</h4>
      <div class="step"><div class="step-num">1</div><div>安装 Chrome 扩展 <strong>Tampermonkey</strong></div></div>
      <div class="step"><div class="step-num">2</div><div>新建脚本，粘贴 <code>王者热点收集器.user.js</code> 内容保存</div></div>
      <div class="step"><div class="step-num">3</div><div>去抖音搜索「王者荣耀」，正常浏览即可自动收集</div></div>
      <div class="step"><div class="step-num">4</div><div>点击右下角 ⚔️ 按钮 →「📋 复制数据」</div></div>
      <div class="step"><div class="step-num">5</div><div>回到本页面按 <code>Command+V</code> 导入</div></div>
    </div>
  `;
  return div;
}

// ===== 自动刷新 =====
// 每5分钟自动从服务器刷新
setInterval(async () => {
  try {
    const res = await fetch('./data/memes.json?t=' + Date.now());
    if (res.ok) {
      const fresh = await res.json();
      if (fresh.length !== allMemes.length) {
        allMemes = fresh;
        updateStats(); renderCards();
        showToast('🆕 数据已更新');
      }
    }
  } catch {}
}, 300000);

loadData();
</script>
</body>
</html>
